<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>NET-LOCKY</title>
</head>
<body>
    <h1>NETFLIX</h1>
    
    <div id="tela-perfis">
        <div class="container-perfis">
            <h2>Quem está assistindo?</h2>
            <div class="grade-perfis">
                <div class="perfil" onclick="entrarNoSite()">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/0/0b/Netflix-avatar.png" alt="Locky">
                    <span>Locky</span>
                </div>
                <div class="perfil" onclick="entrarNoSite()">
                    <img src="https://loodibee.com/wp-content/uploads/Netflix-avatar-9.png" alt="Infantil">
                    <span>Infantil</span>
                </div>
                <div class="perfil" onclick="entrarNoSite()">
                    <img src="https://loodibee.com/wp-content/uploads/Netflix-avatar-2.png" alt="Amigo">
                    <span>Amigo</span>
                </div>
            </div>
            <button class="btn-gerenciar">Gerenciar Perfis</button>
        </div>
    </div>

    <div id="tela-home" class="oculto">
        <header>
            <span class="logo">NETFLIX</span>
            <div class="header-opcoes">
                <div class="filtro-container">
                    <label for="genero">Gênero: </label>
                    <select id="genero">
                        <option value="todos">Todos</option>
                        <option value="terror">Terror</option>
                        <option value="comedia">Comédia</option>
                    </select>
                </div>
                <button class="btn-trocar-perfil" onclick="deslogarPerfil()">Trocar Perfil</button>
            </div>
        </header>

        <main class="grade-filmes">
            <div class="cartao-filme" data-genero="terror" onclick="abrirDetalhes('O Chamado', 'Uma jornalista decide investigar a misteriosa morte de sua sobrinha, que faleceu após assistir a uma fita de vídeo amaldiçoada que dizem causar a morte de quem a assiste em sete dias.', 'A14', '1h 55min', 'https://placehold.co/800x450/8b0000/ffffff?text=O+Chamado')">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR4uB62UbQJKH0auZpCkfmqOUmiGup7lb-gmUlaI-cNQg&s=10" alt="O Chamado">
                <h3>O Chamado</h3>
            </div>
            
            <div class="cartao-filme" data-genero="terror" onclick="abrirDetalhes('Invocação do Mal', 'Investigadores paranormais trabalham para ajudar uma família aterrorizada por uma presença sombria em sua fazenda isolada.', 'A14', '1h 52min', 'https://placehold.co/800x450/5c0000/ffffff?text=Invocacao+do+Mal')">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSzCgZyfWzUNR3yBEcwNwGT8bWorUIZunh79UCLUEXaSg&s" alt="Invocação do Mal">
                <h3>Invocação do Mal</h3>
            </div>

            <div class="cartao-filme" data-genero="comedia" onclick="abrirDetalhes('Gente Grande', 'Após a morte de seu treinador de basquete de infância, cinco amigos e suas famílias decidem passar o fim de semana do feriado juntos.', 'Livre', '1h 42min', 'https://placehold.co/800x450/1f3a60/ffffff?text=Gente+Grande')">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQKuGNf4B5WGu-TWDnjA7_2-FrgxZAZ0KhOk6Eft_y6Jw&s" alt="Gente Grande">
                <h3>Gente Grande</h3>
            </div>

            <div class="cartao-filme" data-genero="comedia" onclick="abrirDetalhes('As Branquelas', 'Dois agentes do FBI negros se disfarçam de herdeiras brancas da alta sociedade para desmascarar um plano de sequestro.', 'A12', '1h 49min', 'https://placehold.co/800x450/0f2537/ffffff?text=As+Branquelas')">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRLvNmzF-bAt4hylQzrjvvX2P66I-TkYPyizCmOXUmFrg&s=10" alt="As Branquelas">
                <h3>As Branquelas</h3>
            </div>
        </main>
    </div>

    <div id="tela-detalhes" class="secao-detalhes">
        <button class="botao-voltar" onclick="voltarParaHome()">← Voltar para o Catálogo</button>

        <div class="container-filme">
            <div class="banner-filme">
                <img id="detalhe-img" src="" alt="Banner">
            </div>

            <div class="info-filme">
                <h1 id="detalhe-titulo" class="titulo-filme">Título</h1>

                <div class="metadados">
                    <span class="ano">2026</span>
                    <span id="detalhe-classificacao" class="classificacao-etaria">A16</span>
                    <span id="detalhe-duracao" class="duracao">Duração</span>
                </div>

                <p id="detalhe-sinopse" class="sinopse">Sinopse aqui...</p>

                <div class="botoes-acoes">
                    <button class="btn-assistir" onclick="abrirPlayer()">▶ Assistir</button>
                    <button class="btn-minha-lista">+ Minha Lista</button>
                </div>
            </div>
        </div>
    </div>

    <div id="tela-player" class="secao-player">
        <button class="btn-fechar-player" onclick="fecharPlayer()">✕ Fechar</button>
        <div class="video-container">
            <iframe id="video-iframe" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
