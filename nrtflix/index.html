<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>NET-LOCKY</title>
</head>
<body>
    <div id="tela-perfis">
        <div class="container-perfis">
            <h2>Quem está assistindo?</h2>
            <div class="grade-perfis">
                <div class="perfil" onclick="entrarNoSite('Locky')">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/0/0b/Netflix-avatar.png" alt="Locky">
                    <span>Locky</span>
                </div>
                <div class="perfil" onclick="entrarNoSite('Infantil')">
                    <img src="https://i.pinimg.com/474x/b4/0b/51/b40b51418293936a6e0ad09ffa229cb7.jpg" alt="Infantil">
                    <span>Infantil</span>
                </div>
                <div class="perfil" onclick="entrarNoSite('Amigo')">
                    <img src="https://i.pinimg.com/474x/64/e1/eb/64e1eb2d17dd18e2bf04fab75f913c85.jpg" alt="Amigo">
                    <span>Amigo</span>
                </div>
            </div>
            <button class="btn-gerenciar">Gerenciar Perfis</button>
        </div>
    </div>

    <div id="tela-home" class="oculto">
        <header>
            <div class="header-esquerda">
                <span class="logo" onclick="voltarParaHome()">NETFLIX</span>
                <span class="nav-item" onclick="abrirMinhaLista()">Minha Lista</span>
            </div>
            <div class="header-opcoes">
                <div class="filtro-container" id="container-filtro-genero">
                    <label for="genero">Gênero: </label>
                    <select id="genero">
                        <option value="todos">Todos</option>
                        <option value="terror">Terror</option>
                        <option value="comedia">Comédia</option>
                    </select>
                </div>
                <button class="btn-trocar-perfil" onclick="deslogarPerfil()">Trocar Perfil</button>
            </div>
        </header>

        <main class="conteudo-principal">
            <div class="alinhamento-titulo-botao">
                <h2 id="titulo-secao" class="titulo-pagina">Filmes Disponíveis</h2>
                <button id="btn-voltar-da-lista" class="botao-voltar oculto" onclick="voltarParaHome()">← Voltar para o Início</button>
            </div>

            <section class="grade-filmes" id="grade-principal">
                <div class="cartao-filme" data-id="o-chamado" data-genero="terror" onclick="abrirDetalhes('O Chamado', 'Uma jornalista decide investigar a misteriosa morte de sua sobrinha, que faleceu após assistir a uma fita de vídeo amaldiçoada que dizem causar a morte de quem a assiste em sete dias.', 'A14', '1h 55min', 'https://placehold.co/800x450/8b0000/ffffff?text=O+Chamado', 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR4uB62UbQJKH0auZpCkfmqOUmiGup7lb-gmUlaI-cNQg&s=10')">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR4uB62UbQJKH0auZpCkfmqOUmiGup7lb-gmUlaI-cNQg&s=10" alt="O Chamado">
                    <h3>O Chamado</h3>
                </div>
                
                <div class="cartao-filme" data-id="invocacao-do-mal" data-genero="terror" onclick="abrirDetalhes('Invocação do Mal', 'Investigadores paranormais trabalham para ajudar uma família aterrorizada por uma presença sombria em sua fazenda isolada.', 'A14', '1h 52min', 'https://placehold.co/800x450/5c0000/ffffff?text=Invocacao+do+Mal', 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSzCgZyfWzUNR3yBEcwNwGT8bWorUIZunh79UCLUEXaSg&s')">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSzCgZyfWzUNR3yBEcwNwGT8bWorUIZunh79UCLUEXaSg&s" alt="Invocação do Mal">
                    <h3>Invocação do Mal</h3>
                </div>

                <div class="cartao-filme" data-id="gente-grande" data-genero="comedia" onclick="abrirDetalhes('Gente Grande', 'Após a morte de seu treinador de basquete de infância, cinco amigos e suas famílias decidem passar o fim de semana do feriado juntos.', 'Livre', '1h 42min', 'https://placehold.co/800x450/1f3a60/ffffff?text=Gente+Grande', 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQKuGNf4B5WGu-TWDnjA7_2-FrgxZAZ0KhOk6Eft_y6Jw&s')">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQKuGNf4B5WGu-TWDnjA7_2-FrgxZAZ0KhOk6Eft_y6Jw&s" alt="Gente Grande">
                    <h3>Gente Grande</h3>
                </div>

                <div class="cartao-filme" data-id="as-branquelas" data-genero="comedia" onclick="abrirDetalhes('As Branquelas', 'Dois agentes do FBI negros se disfarçam de herdeiras brancas da alta sociedade para desmascarar um plano de sequestro.', 'A12', '1h 49min', 'https://placehold.co/800x450/0f2537/ffffff?text=As+Branquelas', 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRLvNmzF-bAt4hylQzrjvvX2P66I-TkYPyizCmOXUmFrg&s=10')">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRLvNmzF-bAt4hylQzrjvvX2P66I-TkYPyizCmOXUmFrg&s=10" alt="As Branquelas">
                    <h3>As Branquelas</h3>
                </div>
            </section>

            <section class="grade-filmes oculto" id="grade-minha-lista">
                </section>
        </main>
    </div>

    <div id="tela-detalhes" class="secao-detalhes">
        <div class="wrapper-detalhes">
            <button class="botao-voltar" onclick="voltarParaCatalogoAnterior()">← Voltar para o Catálogo</button>

            <div class="container-filme">
                <div class="banner-filme">
                    <img id="detalhe-img" src="" alt="Banner">
                </div>

                <div class="info-filme">
                    <h1 id="detalhe-titulo" class="titulo-filme">Título</h1>

                    <div class="metadados">
                        <span class="ano">2026</span>
                        <span id="detalhe-classificacao" class="classificacao-etaria">A16</span>
                        <span id="detalhe-duracao" class="duracao">Duração</span>
                    </div>

                    <p id="detalhe-sinopse" class="sinopse">Sinopse aqui...</p>

                    <div class="botoes-acoes">
                        <button class="btn-assistir" onclick="abrirPlayer()">▶ Assistir</button>
                        <button id="btn-lista-toggle" class="btn-minha-lista" onclick="alternarMinhaLista()">+ Minha Lista</button>
                    </div>

                    <div class="secao-avaliacao">
                        <h3>Deixe sua Avaliação</h3>
                        <div class="estrelas">
                            <span class="estrela" onclick="votarEstrela(1)">★</span>
                            <span class="estrela" onclick="votarEstrela(2)">★</span>
                            <span class="estrela" onclick="votarEstrela(3)">★</span>
                            <span class="estrela" onclick="votarEstrela(4)">★</span>
                            <span class="estrela" onclick="votarEstrela(5)">★</span>
                        </div>
                        <textarea id="campo-comentario" placeholder="Escreva um breve comentário sobre o filme..."></textarea>
                        <button class="btn-salvar-avaliacao" onclick="salvarAvaliacao()">Salvar Avaliação</button>
                        <div id="mensagem-sucesso" class="oculto">Avaliação salva com sucesso!</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="tela-player" class="secao-player">
        <button class="btn-fechar-player" onclick="fecharPlayer()">✕ Fechar Player</button>
        <div class="video-container">
            <iframe id="video-iframe" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
